name: Security Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # weekly Monday 09:00 UTC

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # LTS for npm ci / audit; actions v5 run on Node 24 (no Node 20 action-runtime deprecation)
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
