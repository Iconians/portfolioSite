name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
      NEXTAUTH_SECRET: ci-placeholder-secret-min-32-chars-long!!
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Security (high/critical only)
        run: npm audit --audit-level=high

      - name: ESLint
        run: npm run lint

      - name: Prisma migrate (CI database)
        run: npx prisma migrate deploy

      - name: Prisma validate
        run: npx prisma validate

      - name: Production build
        run: npm run build
